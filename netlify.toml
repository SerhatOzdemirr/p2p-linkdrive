[build]
  base    = "client"
  command = "npm run build"
  publish = "dist"

# .mjs dosyaları JavaScript MIME ile servis edilmeli (pdf.js worker modülü)
# Aksi halde octet-stream döner, tarayıcı modül scriptini reddeder → fake worker
[[headers]]
  for = "/*.mjs"
  [headers.values]
    Content-Type = "text/javascript"

[[headers]]
  for = "/assets/*.mjs"
  [headers.values]
    Content-Type = "text/javascript"

# SPA — tüm route'lar index.html'e
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
