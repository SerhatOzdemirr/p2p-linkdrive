services:

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
    expose:
      - "3001"          # sadece iç network — dışarıya kapalı
    networks:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_SERVER_URL: ""       # boş = Nginx /socket.io/ proxy üzerinden
        VITE_TURN_URL: ""         # TURN kullanmak istersen doldur
        VITE_TURN_USER: ""
        VITE_TURN_PASS: ""
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - app

networks:
  app:
    driver: bridge
