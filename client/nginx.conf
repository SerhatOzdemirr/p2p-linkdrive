server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip sıkıştırma
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/wasm image/svg+xml;

    # .mjs (pdf.js worker modülü) — nginx default mime.types'ında yok, octet-stream döner.
    # Modül scriptleri katı MIME kontrolünden geçtiği için text/javascript zorunlu.
    location ~* \.mjs$ {
        default_type text/javascript;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Vite hash'li asset'ler — 1 yıl cache
    location ~* \.(?:js|css|woff2?|png|jpg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Socket.io WebSocket + polling → server container
    location /socket.io/ {
        proxy_pass         http://server:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;   # WebSocket long-lived
    }

    # SPA fallback — tüm route'lar index.html'e
    location / {
        try_files $uri $uri/ /index.html;
    }
}
